<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Keyboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 style="text-align: center; font-family: Verdana, Geneva, Tahoma, sans-serif;">Virtual KeyBoard</h1>
    <div class="container">
        <div class="inputBox">
            <p id="inputText"></p>
        </div>
        <div class="keyboard">
            <div class="firstRow">
                <p id="letter">Q</p>
                <p id="letter">W</p>
                <p id="letter">E</p>
                <p id="letter">R</p>
                <p id="letter">T</p>
                <p id="letter">Y</p>
                <p id="letter">U</p>
                <p id="letter">I</p>
                <p id="letter">O</p>
                <p id="letter">P</p>
            </div>
            <div class="secondRow">
                <p id="letter">A</p>
                <p id="letter">S</p>
                <p id="letter">D</p>
                <p id="letter">F</p>
                <p id="letter">G</p>
                <p id="letter">H</p>
                <p id="letter">J</p>
                <p id="letter">K</p>
                <p id="letter">L</p>
            </div>
            <div class="thirdRow">
                <p id="letter">Z</p>
                <p id="letter">X</p>
                <p id="letter">C</p>
                <p id="letter">V</p>
                <p id="letter">B</p>
                <p id="letter">N</p>
                <p id="letter">M</p>
                <p id="backSpace">←⨉</p>
            </div>
            <div class="fourthRow">
                <p id="tab">⇆</p>
                <p id="spaceBar"></p>
                <p id="clearAll">Clear All</p>
                <p id="capsLock">Caps Lock</p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
